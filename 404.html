<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Index</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; flex: 1; min-height: 0; }
    #ticker, #label {
      color: #fff;
      font-family: Arial, sans-serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 16px 0;
      opacity: 0.6;
      width: 100%;
      text-align: center;
    }
    #ticker { font-size: 14px; }
    #label { font-size: 17px; }
    #ticker {
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }
    #ticker span { display: inline-block; will-change: transform; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="ticker"><span id="ticker-inner"></span></div>
<div id="label">This page either does not exist or is under maintenance</div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

  const label = document.getElementById('label');

  const tickerSpan = document.getElementById('ticker-inner');
  fetch('/ticker.txt').then(r => r.ok ? r.text() : '').then(t => { if (t) tickerSpan.textContent = t.trim(); });

  let tickerX = window.innerWidth;
  let tickerPausing = false;
  let tickerPauseTimer = 0;
  const TICKER_SPEED = 50;
  const TICKER_PAUSE = 4;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1;
  document.body.insertBefore(renderer.domElement, label);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;

  let pivot = null;
  let matrixMat = null;
  let mat404 = null;
  const heads = [];

  const HEAD_COUNT = 42;

  function randRate() { return (Math.random() - 0.5) * 0.4; }

  function fibonacciSphere(n, radius) {
    const pts = [];
    const golden = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = golden * i;
      pts.push(new THREE.Vector3(Math.cos(theta) * r * radius, y * radius, Math.sin(theta) * r * radius));
    }
    return pts.slice(1, -1);
  }

  new GLTFLoader().load('/models/under_construction.glb', (gltf) => {
    const box = new THREE.Box3().setFromObject(gltf.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);

    gltf.scene.position.sub(center);

    const radius = maxDim * 3;
    pivot = new THREE.Group();
    scene.add(pivot);

    const up = new THREE.Vector3(0, 1, 0);

    fibonacciSphere(HEAD_COUNT, radius).forEach((pos) => {
      const clone = gltf.scene.clone(true);
      clone.position.copy(pos);
      clone.quaternion.setFromUnitVectors(up, pos.clone().normalize());
      clone.userData.spin = { x: randRate(), y: randRate(), z: randRate() };
      pivot.add(clone);
      heads.push(clone);
    });

    // Materials are shared across clones — one ref updates all
    gltf.scene.traverse((child) => {
      if (child.isMesh) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach((mat) => {
          if (mat.transmission > 0) {
            mat.transparent = true;
            if (!mat.thickness) mat.thickness = 0.5;
            mat.needsUpdate = true;
          }
          if (mat.name === 'MatrixDisplay') matrixMat = mat;
        });
      }
    });

    const cvs404 = document.createElement('canvas');
    cvs404.width = 1024; cvs404.height = 512;
    const ctx = cvs404.getContext('2d');
    ctx.font = 'bold 420px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // outer glow
    ctx.shadowColor = 'rgba(255, 0, 0, 0.5)';
    ctx.shadowBlur = 90;
    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
    ctx.fillText('404', 512, 256);
    // mid glow
    ctx.shadowBlur = 60;
    ctx.fillStyle = 'rgba(255, 10, 10, 0.55)';
    ctx.fillText('404', 512, 256);
    // core
    ctx.shadowBlur = 30;
    ctx.shadowColor = 'rgba(255, 20, 20, 1)';
    ctx.fillStyle = 'rgba(255, 30, 30, 0.85)';
    ctx.fillText('404', 512, 256);
    const plane404 = new THREE.Mesh(
      new THREE.PlaneGeometry(maxDim * 5, maxDim * 2.5),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cvs404), transparent: true, side: THREE.DoubleSide, depthWrite: false })
    );
    plane404.position.set(0, 0, radius);
    plane404.rotation.y = Math.PI;
    scene.add(plane404);
    mat404 = plane404.material;

    camera.position.set(0, 0, 0);
    camera.near = maxDim * 0.1;
    camera.far = radius * 6;
    camera.lookAt(0, 0, radius);
    camera.updateProjectionMatrix();
  });

  function resize() {
    const labelH = label.offsetHeight;
    const w = window.innerWidth;
    const h = window.innerHeight - labelH;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  const clock = new THREE.Clock();
  const RPM = 1 / 25;

  (function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (pivot) pivot.rotation.y += (0.75 * Math.PI * RPM) * delta;
    if (pivot) pivot.rotation.x += (0.15 * Math.PI * RPM) * delta;
    // if (pivot) pivot.rotation.z += (0.5 * Math.PI * RPM) * delta;
    heads.forEach((h) => {
      h.rotation.x += h.userData.spin.x * delta;
      h.rotation.y += h.userData.spin.y * delta;
      h.rotation.z += h.userData.spin.z * delta;
    });

    const pulse = 1.5 * Math.abs(Math.sin(clock.getElapsedTime()));
    if (matrixMat) matrixMat.emissiveIntensity = pulse * 2;
    if (mat404) mat404.opacity = pulse * 0.75;

    if (!tickerPausing) {
      tickerX -= TICKER_SPEED * delta;
      if (tickerX < -tickerSpan.offsetWidth) {
        tickerPausing = true;
        tickerPauseTimer = TICKER_PAUSE;
      }
    } else {
      tickerPauseTimer -= delta;
      if (tickerPauseTimer <= 0) {
        tickerPausing = false;
        tickerX = window.innerWidth;
      }
    }
    tickerSpan.style.transform = `translateX(${tickerX}px)`;

    renderer.render(scene, camera);
  })();
</script>
</body>
</html>
