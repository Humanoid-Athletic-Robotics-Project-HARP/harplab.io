<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HARP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { position: fixed; top: 0; left: 0; display: block; z-index: 0; }
    #ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    h1 {
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: clamp(36px, 8vw, 96px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 40px;
    }
    nav {
      display: flex;
      gap: 48px;
      pointer-events: all;
    }
    nav a {
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.25s;
    }
    nav a:hover { opacity: 1; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="ui">
  <h1>HARP</h1>
  <nav>
    <a href="/about">About</a>
    <a href="/team">Team</a>
    <a href="/research">Research</a>
    <a href="/contact">Contact</a>
  </nav>
</div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1;
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;

  const pivot = new THREE.Group();
  scene.add(pivot);

  const COUNT = 12;
  const MODELS = ['angry_guy', 'satisfied_guy', 'surprised_guy'];

  function loadGLTF(url) {
    return new Promise((resolve, reject) => new GLTFLoader().load(url, resolve, undefined, reject));
  }

  Promise.all(MODELS.map(m => loadGLTF(`/models/${m}.glb`))).then(gltfs => {
    const box0 = new THREE.Box3().setFromObject(gltfs[0].scene);
    const size0 = box0.getSize(new THREE.Vector3());
    const maxDim = Math.max(size0.x, size0.y, size0.z);

    // Center each model at its own origin before cloning
    gltfs.forEach(gltf => {
      const b = new THREE.Box3().setFromObject(gltf.scene);
      gltf.scene.position.sub(b.getCenter(new THREE.Vector3()));
    });

    // Radius: large enough that 12 heads don't crowd, and the wheel extends off-screen
    const radius = Math.max(maxDim * 5, (COUNT * maxDim * 1.4) / (Math.PI * 2));

    for (let i = 0; i < COUNT; i++) {
      const angle = (i / COUNT) * Math.PI * 2;
      const clone = gltfs[i % 3].scene.clone(true);
      // Place on horizontal circle (XZ plane)
      clone.position.set(Math.sin(angle) * radius, 0, Math.cos(angle) * radius);
      // Outward-facing: local -Z points away from center, toward camera as each head passes front
      clone.rotation.y = angle + Math.PI;
      pivot.add(clone);
    }

    // Camera close enough that the side heads clip off-screen (the scroll-wheel crop)
    const camDist = radius * 1.2;
    camera.position.set(0, maxDim * 0.4, camDist);
    camera.near = maxDim * 0.01;
    camera.far = camDist * 4;
    camera.lookAt(0, 0, 0);
    camera.updateProjectionMatrix();
  });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  const clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    pivot.rotation.y += clock.getDelta() * 0.18;
    renderer.render(scene, camera);
  })();
</script>
</body>
</html>
