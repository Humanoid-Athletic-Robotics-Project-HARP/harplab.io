<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f4f8;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
      padding: 32px;
      max-width: 520px;
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      color: #1a202c;
    }
    p {
      margin: 0 0 24px;
      color: #4a5568;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Test Index Page</h1>
    <p>This is a test HTML page created to verify the site is loading correctly.</p>
    <a href="#" onclick="alert('Test page loaded successfully!'); return false;">Run Test</a>
  </div>
</body>
</html>
